<section class="contacts-section">
    <div class="contacts-section__container">
        <div class="contacts-section__header">
            <h2 class="contacts-section__title">Contact Us</h2>
            <p class="contacts-section__subtitle">Most calendars are designed for teams.<br>Slate is designed for
                freelancers</p>
        </div>
        <div class="contacts-section__content">
            <form class="contacts-form">
                <h3 class="contacts-form__title">Contact Us</h3>
                <div class="contacts-form__fields">
                    <input class="contacts-form__input" type="text" placeholder="Your Name">
                    <input class="contacts-form__input" type="email" placeholder="Your Email">
                    <textarea class="contacts-form__textarea" placeholder="Your Message"></textarea>
                </div>
                <button class="button contacts-form__btn" type="submit">Send</button>
            </form>
            <div class="contacts-info">
                <div class="contacts-info__items">
                    <div class="contacts-info__item">
                        <span class="contacts-info__icon contacts-info__icon--location"></span>
                        <span class="contacts-info__text">6386 Spring St undefined Anchorage, Georgia 12473 United
                            States</span>
                    </div>
                    <div class="contacts-info__item">
                        <span class="contacts-info__icon contacts-info__icon--phone"></span>
                        <span class="contacts-info__text">(843) 555-0130</span>
                    </div>
                    <div class="contacts-info__item">
                        <span class="contacts-info__icon contacts-info__icon--email"></span>
                        <span class="contacts-info__text">willie.jennings@example.com</span>
                    </div>
                </div>
                <div class="contacts-info__map">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d24038.68592943407!2d24.121094948300247!3d49.46045235226415!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x473a89f8491c827d%3A0xd06381c25aab60b!2z0JrQvtGB0YLQtdC7INCS0L7Qt9C00LLQuNC20LXQvdC90Y8g0KfQtdGB0L3QvtCz0L4g0KXRgNC10YHRgtCw!5e0!3m2!1suk!2sua!4v1773987283947!5m2!1suk!2sua"
                        style="border:0;" allowfullscreen="" loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                <div class="contacts-info__social">
                    <a href="https://twitter.com" class="contacts-info__social-link contacts-info__social-link--twitter"
                        aria-label="Twitter">
                        <img src="img/twitter-blue-logo.svg" alt="Twitter" class="contacts-info__social-icon">
                    </a>
                    <a href="https://facebook.com"
                        class="contacts-info__social-link contacts-info__social-link--facebook" aria-label="Facebook">
                        <img src="img/facebook-blue-logo.svg" alt="Facebook" class="contacts-info__social-icon">
                    </a>
                    <a href="https://linkedin.com"
                        class="contacts-info__social-link contacts-info__social-link--linkedin" aria-label="LinkedIn">
                        <img src="img/in-blue-logo.svg" alt="LinkedIn" class="contacts-info__social-icon">
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
